[project]
name = "voicerecog"
version = "0.1.0"
description = ""
authors = [{ name = "sondeko", email = "sondeko143@gmail.com" }]
requires-python = ">=3.11,<3.12"
readme = "README.md"
license = "MIT"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
]
dependencies = [
    "google-cloud-translate>=3.11.1,<4",
    "httpx>=0.26.0,<0.27.0",
    "pydantic>=1.10.7,<2",
    "aiofiles>=23.1.0,<24",
    "pyhumps>=3.8.0,<4",
    "google-cloud-speech>=2.19.0,<3",
    "toml>=0.10.2,<0.11",
    "click>=8.1.3,<9",
    "vstreamer-protos",
    "colorlog>=6.7.0,<7",
    "emoji>=2.6.0,<3",
    "ctranslate2>=4.6.1,<5",
]

[project.optional-dependencies]
voicevox = ["voicevox-core ; sys_platform == 'win32'"]
whisper = [
    "faster-whisper==1.2.1",
    "torch ; sys_platform == 'win32'",
    "onnxruntime-gpu>=1.24.4,<2",
]
rvc = [
    "torch ; sys_platform == 'win32'",
    "fairseq ; sys_platform == 'win32'",
    "pyworld>=0.3.3,<0.4",
    "faiss-cpu>=1.7.2,<2 ; sys_platform == 'win32'",
    "onnxruntime-gpu>=1.24.4,<2",
    "torchaudio ; sys_platform == 'win32'",
    "numpy>=1.18,<1.24",
    "scipy>=1.10.1,<2",
]
mozc = ["mozcpy>=0.1.1,<0.2"]
vroid2 = ["pyvcroid2 ; sys_platform == 'win32'"]
audio = ["PyAudio>=0.2.13,<0.3"]
gui = [
    "ttkbootstrap>=1.10.1,<2",
    "pillow>=12.1.1,<13",
]
crepe = ["librosa>=0.10.1,<0.11"]

[project.urls]
Repository = "https://github.com/sondeko143/vstreamer-tool"

[project.scripts]
vspeech = "vspeech.main:cmd"

[dependency-groups]
dev = [
    "pytest>=7.3.1,<8",
    "docutils>=0.19,<0.20",
    "pytest-cov>=4.0.0,<5",
    "pytest-grpc>=0.8.0,<0.9",
    "pytest-asyncio>=0.21.0,<0.22",
    "pytest-httpx",
    "ruff>=0.15.17",
    "ty>=0.0.49",
]

[tool.uv]
default-groups = "all"
# voicevox-core / torch / torchaudio / fairseq / pyvcroid2 are Windows-only wheels,
# and onnxruntime-gpu has no macOS wheel. Restrict resolution to the platforms this
# project actually targets (Windows for dev, Linux for the Docker image).
environments = [
    "sys_platform == 'win32'",
    "sys_platform == 'linux'",
]
# faster-whisper depends on the CPU `onnxruntime`, which shares the same `onnxruntime`
# module with `onnxruntime-gpu` and clobbers its CUDA-enabled binary when both are
# installed. Drop the CPU build entirely; `onnxruntime-gpu` (in the whisper/rvc extras)
# provides the `onnxruntime` module that faster-whisper imports.
override-dependencies = ["onnxruntime ; sys_platform == 'never'"]

[tool.uv.sources]
vstreamer-protos = { url = "https://github.com/sondeko143/vstreamer-protos/releases/download/main-04910026/vstreamer_protos-0.1.0-py3-none-any.whl" }
voicevox-core = { url = "https://github.com/VOICEVOX/voicevox_core/releases/download/0.16.4/voicevox_core-0.16.4-cp310-abi3-win_amd64.whl" }
torch = { url = "https://download.pytorch.org/whl/cu128/torch-2.7.0%2Bcu128-cp311-cp311-win_amd64.whl" }
torchaudio = { url = "https://download.pytorch.org/whl/cu128/torchaudio-2.7.0%2Bcu128-cp311-cp311-win_amd64.whl" }
fairseq = { url = "https://github.com/sondeko143/fairseq-311/releases/download/v0.12.2.post1/fairseq-0.12.2.post1-cp311-cp311-win_amd64.whl" }
pyvcroid2 = { git = "https://github.com/Nkyoku/pyvcroid2" }

[tool.uv.build-backend]
module-name = ["vspeech"]
module-root = ""

[build-system]
requires = ["uv_build>=0.11.20,<0.12.0"]
build-backend = "uv_build"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = "."
asyncio_mode = "auto"

[tool.ty.environment]
python-version = "3.11"

[tool.ruff.lint.isort]
force-single-line = true
