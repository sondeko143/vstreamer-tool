[tool.poetry]
name = "voicerecog"
version = "0.1.0"
description = ""
authors = ["sondeko <sondeko143@gmail.com>"]
license = "MIT"
readme = ["README.md"]
repository = "https://github.com/sondeko143/vstreamer-tool"
packages = [{ include = "vspeech" }]

[tool.poetry.dependencies]
google-cloud-translate = "^3.11.1"
python = ">=3.11,<3.12"
httpx = ">=0.26.0,<0.27.0"
pydantic = "^1.10.7"
aiofiles = "^23.1.0"
pyhumps = "^3.8.0"
google-cloud-speech = "^2.19.0"
toml = "^0.10.2"
click = "^8.1.3"
vstreamer-protos = { url = "https://github.com/sondeko143/vstreamer-protos/releases/download/main-04910026/vstreamer_protos-0.1.0-py3-none-any.whl" }
voicevox-core = [
    { url = "https://github.com/VOICEVOX/voicevox_core/releases/download/0.14.3/voicevox_core-0.14.3+cuda-cp38-abi3-win_amd64.whl", platform = "win32", optional = true },
]
faster-whisper = "1.2.1"
torch = [
    { url = "https://download.pytorch.org/whl/cu128/torch-2.7.0%2Bcu128-cp311-cp311-win_amd64.whl", platform = "win32", optional = true },
]
fairseq = { url = "https://github.com/sondeko143/fairseq-311/releases/download/v0.12.2.post1/fairseq-0.12.2.post1-cp311-cp311-win_amd64.whl", optional = true }
pyworld = { version = "^0.3.3", optional = true }
faiss-cpu = [{ version = "^1.7.2", platform = "win32", optional = true }]
onnxruntime-gpu = "1.19.0"
torchaudio = [
    { url = "https://download.pytorch.org/whl/cu128/torchaudio-2.7.0%2Bcu128-cp311-cp311-win_amd64.whl", platform = "win32", optional = true },
]
numpy = { version = ">=1.18,<1.24", optional = true }
scipy = { version = "^1.10.1", optional = true }
mozcpy = { version = "^0.1.1", optional = true }
pyvcroid2 = { git = "https://github.com/Nkyoku/pyvcroid2", platform = "win32", optional = true }
PyAudio = { version = "^0.2.13", optional = true }
ttkbootstrap = { version = "^1.10.1", optional = true }
pillow = { version = "^12.1.1", optional = true }
colorlog = "^6.7.0"
emoji = "^2.6.0"
librosa = { version = "^0.10.1", optional = true }
ctranslate2 = "^4.6.1"

[tool.poetry.group.dev.dependencies]
pytest = "^7.3.1"
docutils = "^0.19"
pytest-cov = "^4.0.0"
pytest-grpc = "^0.8.0"
pytest-asyncio = "^0.21.0"
pytest-httpx = "*"


[tool.poetry.extras]
voicevox = ["voicevox-core"]
whisper = ["faster-whisper", "torch"]
rvc = [
    "torch",
    "fairseq",
    "pyworld",
    "faiss-cpu",
    "onnxruntime-gpu",
    "torchaudio",
    "numpy",
    "scipy",
]
mozc = ["mozcpy"]
vroid2 = ["pyvcroid2"]
audio = ["PyAudio"]
gui = ["ttkbootstrap", "pillow"]
crepe = ["librosa"]

[tool.poetry.scripts]
vspeech = "vspeech.main:cmd"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = "."
asyncio_mode = "auto"

[tool.pyright]
typeCheckingMode = "strict"
reportUnknownMemberType = "warning"
reportMissingTypeStubs = "warning"
reportUnknownVariableType = "warning"

[tool.ruff.lint.isort]
force-single-line = true
